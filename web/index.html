<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WPML Viewer for DJI Pilot 2 / FlightHub 2</title>
  <style>/* __MAPLIBRE_CSS__ */</style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #ccc; }
    #header { padding: 8px 12px; background: #252526; border-bottom: 1px solid #3c3c3c; display: flex; align-items: center; gap: 12px; }
    #header h1 { font-size: 13px; font-weight: 600; color: #e8e8e8; }
    #header .meta { font-size: 12px; color: #888; }
    #map-wrap { position: relative; height: calc(100vh - 300px); }
    #map { width: 100%; height: 100%; }
    #basemap-switcher { position: absolute; top: 8px; right: 8px; z-index: 10; display: flex; flex-direction: column; gap: 4px; }
    #basemap-switcher button { padding: 4px 10px; font-size: 11px; background: #252526cc; color: #ccc; border: 1px solid #555; border-radius: 3px; cursor: pointer; }
    #basemap-switcher button.active { background: #0061a4; color: #fff; border-color: #0061a4; }
    #basemap-switcher button:hover:not(.active) { background: #2d2d2d; }
    #basemap-switcher .separator { height: 1px; background: #555; margin: 2px 0; }
    #table-container { height: 300px; overflow-y: auto; background: #252526; border-top: 1px solid #3c3c3c; position: relative; z-index: 100; }
    .maplibregl-ctrl-attrib { bottom: auto; top: calc(100vh - 350px) !important; background: rgba(255,255,255,0.1) !important; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { background: #2d2d2d; color: #bbb; padding: 4px 8px; text-align: left; position: sticky; top: 0; }
    td { padding: 3px 8px; border-bottom: 1px solid #2d2d2d; color: #ccc; }
    tr:hover td { background: #2a2d2e; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-left: 8px; }
    .badge-kmz { background: #0e7a0d; color: #fff; }
    .badge-wpml { background: #0061a4; color: #fff; }
    tr.highlight td { background: #1a3a5c; color: #fff; }

    /* --- standalone-only UI --- */
    .dropzone { min-height: 100vh; display: grid; place-items: center; padding: 24px; transition: background 0.15s; }
    .dropzone.dragging { background: #14314d; }
    .drop-card { width: min(520px, 92vw); display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 48px 32px; text-align: center; cursor: pointer;
      background: #252526; border: 2px dashed #4a4a4a; border-radius: 12px; }
    .dropzone.dragging .drop-card { border-color: #0061a4; }
    .drop-card:hover { border-color: #6a6a6a; }
    .drop-icon { font-size: 42px; }
    .drop-title { font-size: 18px; color: #e8e8e8; }
    .drop-sub { font-size: 13px; color: #888; }
    .drop-error { margin-top: 8px; font-size: 12px; color: #ff8080; background: #3a1a1a; border: 1px solid #5c2a2a; border-radius: 4px; padding: 8px 12px; }
    .reset-btn { position: fixed; top: 6px; right: 12px; z-index: 200; padding: 4px 10px; font-size: 11px;
      background: #252526cc; color: #ccc; border: 1px solid #555; border-radius: 3px; cursor: pointer; }
    .reset-btn:hover { background: #2d2d2d; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./bundle.js"></script>
</body>
</html>
